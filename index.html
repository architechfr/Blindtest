<head>

  <!-- Tailwind (CDN, comme le reste d'AXION) -->

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Baloo 2"', 'system-ui', 'sans-serif'],
            chrome: ['"Audiowide"', 'system-ui', 'sans-serif'],
            tech: ['"Orbitron"', 'system-ui', 'sans-serif']
          },
          colors: {
            night: '#0b0014',
            grape: '#1a0b2e',
            sunset: '#ff6b3d',
            neon: { pink: '#ff2e9a', violet: '#8b5cf6', cyan: '#22d3ee', lime: '#a3e635', gold: '#fbbf24', orange: '#ff8a00' }
          },
          keyframes: {
            pop: { '0%': { transform: 'scale(1)' }, '50%': { transform: 'scale(0.92)' }, '100%': { transform: 'scale(1)' } },
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
            ring: { '0%': { boxShadow: '0 0 0 0 rgba(255,46,154,.7)' }, '100%': { boxShadow: '0 0 0 40px rgba(255,46,154,0)' } },
            slidein: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } }
          },
          animation: {
            pop: 'pop .25s ease',
            float: 'float 3s ease-in-out infinite',
            ring: 'ring 1.2s ease-out infinite',
            slidein: 'slidein .35s ease both'
          }
        }

  <style>
    :root { --bt-max: 480px; }
    * { -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    html { background: #05000a; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: #05000a;
      overscroll-behavior: none;
    }

    /* ====================== DÉCOR SYNTHWAVE (fixe, derrière tout) ====================== */
    .bt-bg { position: fixed; inset: 0; z-index: -2; overflow: hidden;
      background: linear-gradient(180deg,
        #05000a 0%, #0c0530 20%, #2a0a55 38%, #6a1670 52%, #c01f7a 60%,
        #ff486b 63%, #ff9a3c 65%, #1c0738 65%, #0a0118 100%); }
    .bt-stars { position: absolute; inset: 0 0 38% 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, #fff, transparent),
        radial-gradient(1px 1px at 70% 18%, #fff, transparent),
        radial-gradient(1px 1px at 45% 50%, #ffd9f3, transparent),
        radial-gradient(1px 1px at 85% 40%, #fff, transparent),
        radial-gradient(1px 1px at 12% 60%, #cfeeff, transparent),
        radial-gradient(1px 1px at 60% 65%, #fff, transparent);
      opacity: .8; }
    .bt-sun { position: absolute; left: 50%; top: 64%; transform: translate(-50%, -100%);
      width: min(62vw, 320px); height: min(62vw, 320px); border-radius: 50%;
      background: linear-gradient(180deg, #fff6b0 0%, #ffd23f 28%, #ff7a3d 55%, #ff2e9a 82%, #b3146e 100%);
      box-shadow: 0 0 90px 22px rgba(255,90,140,.5), 0 0 160px 40px rgba(255,138,0,.25); }
    .bt-sun::after { content: ""; position: absolute; inset: 0; border-radius: 50%;
      background: repeating-linear-gradient(180deg, transparent 0 16px, #1c0738 16px 22px);
      -webkit-mask: linear-gradient(180deg, transparent 46%, #000 46%);
              mask: linear-gradient(180deg, transparent 46%, #000 46%); }
    .bt-grid { position: absolute; left: -60%; right: -60%; top: 65%; bottom: -25%;
      background-image:
        linear-gradient(to right, rgba(34,211,238,.55) 1.5px, transparent 1.5px),
        linear-gradient(to bottom, rgba(255,46,154,.5) 1.5px, transparent 1.5px);
      background-size: 44px 44px;
      transform: perspective(320px) rotateX(64deg); transform-origin: 50% 0;
      animation: btgrid 1.6s linear infinite;
      -webkit-mask: linear-gradient(180deg, #000 0%, transparent 88%);
              mask: linear-gradient(180deg, #000 0%, transparent 88%); }
    @keyframes btgrid { from { background-position: 0 0; } to { background-position: 0 44px; } }
    @media (prefers-reduced-motion: reduce) { .bt-grid { animation: none; } }

    /* Voile scanlines CRT + vignette */
    .bt-scan { position: fixed; inset: 0; z-index: 60; pointer-events: none;

    .bt-vignette { position: fixed; inset: 0; z-index: -1; pointer-events: none;

    /* ====================== CADRE "APP MOBILE" ====================== */
    #app { position: relative; z-index: 1; width: 100%; max-width: var(--bt-max);
      margin: 0 auto; min-height: 100dvh;
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    @media (min-width: 540px) {
      #app { min-height: min(900px, 94dvh); margin: 3dvh auto;
        border-radius: 34px; overflow: hidden;
        background: rgba(8,2,20,.45); backdrop-filter: blur(3px);
        box-shadow: 0 0 0 2px rgba(34,211,238,.30), 0 0 0 7px rgba(8,2,20,.6),
                    0 0 70px rgba(255,46,154,.28), 0 36px 90px rgba(0,0,0,.6); }
    }

    /* ====================== UTILITAIRES NÉON ====================== */
    .glass { background: linear-gradient(180deg, rgba(40,12,66,.5), rgba(10,3,26,.62));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34,211,238,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 0 26px rgba(34,211,238,.08); }
    .text-glow { text-shadow: 0 0 16px rgba(255,46,154,.7), 0 0 38px rgba(255,46,154,.35); }
    .glow-cyan { text-shadow: 0 0 14px rgba(34,211,238,.75), 0 0 30px rgba(34,211,238,.4); }
    .bt-logo { font-family: "Audiowide", system-ui, sans-serif; letter-spacing: .04em;
      background: linear-gradient(180deg, #fff 0%, #ffe7fb 38%, #ff7ad0 62%, #22d3ee 63%, #18a9c7 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 2px 0 rgba(255,46,154,.6)) drop-shadow(0 0 22px rgba(34,211,238,.45)); }
    .bt-title { font-family: "Orbitron", system-ui, sans-serif; }

    /* Boutons : ressenti tactile + halo néon sur les CTA dégradés */

    button:active { transform: translateY(1px) scale(.985); }
    .btn-glow { box-shadow: 0 0 26px rgba(255,46,154,.45), inset 0 0 0 1px rgba(255,255,255,.12); }

    ::-webkit-scrollbar { width: 8px; }

    /* Confettis (canvas plein écran) */
    #confetti { position: fixed; inset: 0; z-index: 70; pointer-events: none; }

    /* ====================== THÈMES DE COULEUR ====================== */
    body[data-theme="miami"] .bt-bg { background: linear-gradient(180deg,#03252e 0%,#063b46 22%,#0b6b6b 40%,#16a3a3 52%,#27d3c4 58%,#ff6ad5 63%,#ffd23f 65%,#06212b 65%,#03141a 100%); }

    body[data-theme="miami"] .bt-grid { background-image: linear-gradient(to right,rgba(45,212,191,.6) 1.5px,transparent 1.5px),linear-gradient(to bottom,rgba(255,106,213,.5) 1.5px,transparent 1.5px); }

    body[data-theme="outrun"] .bt-bg { background: linear-gradient(180deg,#1a0524 0%,#3b0a3f 24%,#7a1340 44%,#c01f3a 56%,#ff5e3a 62%,#ffb43d 65%,#1a0820 65%,#0a0410 100%); }
    body[data-theme="outrun"] .bt-sun { background: linear-gradient(180deg,#fff3b0,#ffd23f 25%,#ff7a3d 55%,#ff2e3a 100%); }
    body[data-theme="outrun"] .bt-grid { background-image: linear-gradient(to right,rgba(255,138,0,.6) 1.5px,transparent 1.5px),linear-gradient(to bottom,rgba(255,60,90,.5) 1.5px,transparent 1.5px); }

    body[data-theme="ice"] .bt-bg { background: linear-gradient(180deg,#02061a 0%,#071233 24%,#0b2a6b 44%,#1455c0 56%,#3aa0ff 62%,#9fe3ff 65%,#04122e 65%,#020816 100%); }
    body[data-theme="ice"] .bt-sun { background: linear-gradient(180deg,#ffffff,#cfeeff 30%,#5fb6ff 60%,#1455c0 100%); }
    body[data-theme="ice"] .bt-grid { background-image: linear-gradient(to right,rgba(125,211,252,.65) 1.5px,transparent 1.5px),linear-gradient(to bottom,rgba(37,99,235,.5) 1.5px,transparent 1.5px); }

    body[data-theme="galaxy"] .bt-bg { background: linear-gradient(180deg,#05010f 0%,#140531 26%,#3b1080 46%,#6d28d9 56%,#a21caf 62%,#ec4899 65%,#0f0524 65%,#05010f 100%); }
    body[data-theme="galaxy"] .bt-sun { background: linear-gradient(180deg,#f5d0fe,#c084fc 30%,#a21caf 60%,#6d28d9 100%); }
    body[data-theme="galaxy"] .bt-grid { background-image: linear-gradient(to right,rgba(139,92,246,.6) 1.5px,transparent 1.5px),linear-gradient(to bottom,rgba(236,72,153,.5) 1.5px,transparent 1.5px); }

    body[data-theme="mint"] .bt-bg { background: linear-gradient(180deg,#04201f 0%,#073b35 24%,#0f6b5a 42%,#34d399 54%,#a7f3d0 60%,#fbcfe8 64%,#0a201d 64%,#041413 100%); }
    body[data-theme="mint"] .bt-sun { background: linear-gradient(180deg,#fffde7,#a7f3d0 30%,#5eead4 55%,#f472b6 100%); }
    body[data-theme="mint"] .bt-grid { background-image: linear-gradient(to right,rgba(94,234,212,.6) 1.5px,transparent 1.5px),linear-gradient(to bottom,rgba(244,114,182,.5) 1.5px,transparent 1.5px); }

    body.bt-no-anim .bt-grid { animation: none; }

    /* ====================== ROUE & MENU RÉGLAGES ====================== */
    .gear { position: absolute; top: calc(env(safe-area-inset-top) + 12px); right: 14px; z-index: 5;
      width: 42px; height: 42px; border-radius: 50%; }
    #settings.hidden { display: none; }
    #settings { position: fixed; inset: 0; z-index: 80; display: flex; align-items: flex-end; justify-content: center;
      background: rgba(3,0,10,.62); backdrop-filter: blur(5px); }
    @media (min-width: 540px) { #settings { align-items: center; } }
    .set-panel { width: 100%; max-width: 480px; max-height: 92dvh; overflow-y: auto;
      border-radius: 26px 26px 0 0;
      background: linear-gradient(180deg, rgba(22,7,44,.97), rgba(8,2,20,.99));
      border: 1px solid rgba(34,211,238,.25);
      box-shadow: 0 -12px 70px rgba(255,46,154,.25);
      padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
    @media (min-width: 540px) { .set-panel { border-radius: 26px; } }
    .set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 13px 0; border-top: 1px solid rgba(255,255,255,.06); }
    .swatch { width: 40px; height: 40px; border-radius: 13px; border: 2px solid transparent; cursor: pointer; transition: transform .12s; }
    .swatch:active { transform: scale(.92); }
    .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(34,211,238,.7), 0 0 16px rgba(255,46,154,.5); }
    .toggle { width: 52px; height: 30px; border-radius: 999px; background: rgba(255,255,255,.16); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
    .toggle.on { background: linear-gradient(90deg,#22d3ee,#ff2e9a); }
    .toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; transition: left .2s; }
    .toggle.on::after { left: 25px; }
  </style>

<body class="text-white font-display antialiased">
  <!-- Décor Synthwave -->
  <div class="bt-bg" aria-hidden="true">
    <div class="bt-stars"></div>
    <div class="bt-sun"></div>
    <div class="bt-grid"></div>
  </div>
  <div class="bt-vignette" aria-hidden="true"></div>
  <div class="bt-scan" aria-hidden="true"></div>

  <main id="app" class="w-full flex flex-col"></main>

  <!-- Menu Réglages (overlay) -->
  <div id="settings" class="hidden"></div>

  <!-- Confettis + Toasts -->
  <canvas id="confetti" aria-hidden="true"></canvas>
  <div id="toasts" class="fixed inset-x-0 bottom-4 z-50 flex flex-col items-center gap-2 px-4 pointer-events-none"></div>

  <script>
/* =============================================================================
   BLIND TEST MUSICAL — Application de soirée multijoueur temps réel
   -----------------------------------------------------------------------------
   Stack : HTML + Tailwind (CDN) + Supabase Realtime (Broadcast + Presence).
   Aucune table SQL, aucune migration : le jeu est éphémère et tient en mémoire.

   Architecture "autorité hôte" :
     • L'ÉCRAN HÔTE détient l'état complet de la partie (the single source of truth)
       et le diffuse (broadcast "state") à chaque changement.
     • Les ÉCRANS JOUEURS sont des clients fins : ils envoient des intentions
       (broadcast "intent" : join / buzz / answer / vote / leave) et se contentent
       d'afficher l'état reçu de l'hôte.
     • La PRÉSENCE Supabase détecte les connexions/déconnexions.

   Dépendances chargées avant (voir blindtest.html) :
     supabase-js v2, supabase-config.js (window.AXION_SUPABASE), qrcode, html2canvas.
   ============================================================================= */
(function () {
  'use strict';

  /* --------------------------------------------------------------------------
     0. Constantes & utilitaires
     -------------------------------------------------------------------------- */
  /* Credentials Supabase : on réutilise ceux d'AXION si présents (window.AXION_SUPABASE,
     défini par assets/js/supabase-config.js), sinon on retombe sur les valeurs publiques
     intégrées ci-dessous. La clé "anon"/"publishable" est PUBLIQUE par conception (elle
     tourne dans le navigateur). Realtime Broadcast/Presence ne touche à aucune table.
     => L'app fonctionne donc en autonomie totale (GitHub Pages, Vercel, fichier servi…). */
  var SB_FALLBACK = { url: 'https://phfdrgvdfhwtyycxpahq.supabase.co', anonKey: 'sb_publishable_GD32kGL-4Et4FEAAOQQrBQ_zClazT3V' };
  var SB_CONF = window.AXION_SUPABASE || SB_FALLBACK;
  var SB_URL = SB_CONF.url || SB_FALLBACK.url;
  var SB_KEY = SB_CONF.anonKey || SB_FALLBACK.anonKey;
  var BUZZ_LOCK_MS = 3000;          // anti-spam : buzz verrouillé au lancement
  var CODE_ALPHABET = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // sans I,O,0,1,L (lisibilité)

  var app = document.getElementById('app');
  var toasts = document.getElementById('toasts');

  function $(sel, root) { return (root || document).querySelector(sel); }
  function uuid() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxxyxxx'.replace(/[xy]/g, function (c) {
      var r = (Math.random() * 16) | 0, v = c === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }
  function genCode() {
    var s = '';
    for (var i = 0; i < 6; i++) s += CODE_ALPHABET[(Math.random() * CODE_ALPHABET.length) | 0];
    return s;
  }
  function esc(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function deb(fn, ms) { var t; return function () { var a = arguments, c = this; clearTimeout(t); t = setTimeout(function () { fn.apply(c, a); }, ms); }; }
  function initials(name) {
    var parts = String(name || '?').trim().split(/\s+/);
    return ((parts[0][0] || '?') + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  /* Petit feedback sensoriel : bip WebAudio + vibration. */
  var AC = window.AudioContext || window.webkitAudioContext;
  var audioCtx = null;
  function beep(freq, dur, type) {
    try {
      if (prefs && prefs.muted) return;
      if (!AC) return;
      if (!audioCtx) audioCtx = new AC();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'sawtooth'; o.frequency.value = freq || 660;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (dur || 0.18));
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + (dur || 0.18));
    } catch (e) { /* audio bloqué, on ignore */ }
  }
  function vibrate(pattern) { if (prefs && prefs.novib) return; try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {} }

  /* Confettis plein écran (canvas, sans dépendance) */
  var _confCv = document.getElementById('confetti');
  var _confCtx = _confCv && _confCv.getContext('2d');
  var _conf = [], _confRAF = 0;
  function confetti(n) {
    if (prefs && prefs.noanim) return;
    if (!_confCtx) return;
    var W = _confCv.width = window.innerWidth, H = _confCv.height = window.innerHeight;
    var colors = ['#ff2e9a', '#22d3ee', '#a3e635', '#fbbf24', '#8b5cf6', '#ff8a00'];
    for (var i = 0; i < (n || 120); i++) {
      _conf.push({
        x: Math.random() * W, y: -20 - Math.random() * H * 0.3,
        vx: (Math.random() - 0.5) * 6, vy: 3 + Math.random() * 5,
        s: 5 + Math.random() * 7, r: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.3,
        c: colors[(Math.random() * colors.length) | 0]
      });
    }
    if (!_confRAF) _confRAF = requestAnimationFrame(_confStep);
  }
  function _confStep() {
    var W = _confCv.width, H = _confCv.height;
    _confCtx.clearRect(0, 0, W, H);
    for (var i = _conf.length - 1; i >= 0; i--) {
      var p = _conf[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.r += p.vr;
      _confCtx.save(); _confCtx.translate(p.x, p.y); _confCtx.rotate(p.r);
      _confCtx.fillStyle = p.c; _confCtx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6); _confCtx.restore();
      if (p.y > H + 30) _conf.splice(i, 1);
    }
    if (_conf.length) _confRAF = requestAnimationFrame(_confStep);
    else { _confCtx.clearRect(0, 0, W, H); _confRAF = 0; }
  }

  function toast(msg, kind) {
    var c = { ok: 'bg-neon-lime text-black', err: 'bg-rose-500', info: 'bg-neon-violet' }[kind || 'info'];
    var el = document.createElement('div');
    el.className = 'pointer-events-auto px-4 py-2 rounded-full font-bold shadow-lg animate-slidein ' + c;
    el.textContent = msg;
    toasts.appendChild(el);
    setTimeout(function () { el.style.transition = 'opacity .4s'; el.style.opacity = '0'; setTimeout(function () { el.remove(); }, 400); }, 2600);
  }

  /* Stockage local (pseudo + identité client + reprise de partie hôte) */
  var store = {
    get: function (k, d) { try { var v = localStorage.getItem('bt.' + k); return v == null ? d : JSON.parse(v); } catch (e) { return d; } },
    set: function (k, v) { try { localStorage.setItem('bt.' + k, JSON.stringify(v)); } catch (e) {} },
    del: function (k) { try { localStorage.removeItem('bt.' + k); } catch (e) {} }
  };

  var ME = store.get('clientId', null);
  if (!ME) { ME = uuid(); store.set('clientId', ME); }

  /* --------------------------------------------------------------------------
     1. Couche temps réel (Supabase Realtime)
     -------------------------------------------------------------------------- */
  var supa = null;
  function client() {
    if (supa) return supa;
    if (!window.supabase || !SB_URL) throw new Error('SDK Supabase indisponible');
    supa = window.supabase.createClient(SB_URL, SB_KEY, { realtime: { params: { eventsPerSecond: 20 } } });
    return supa;
  }

  /* Ouvre un canal de partie. handlers = { onIntent, onState, onPresence, onReady } */
  function openChannel(code, identity, handlers) {
    var ch = client().channel('blindtest-' + code, {
      config: { broadcast: { self: false }, presence: { key: identity.id } }
    });
    if (handlers.onIntent) ch.on('broadcast', { event: 'intent' }, function (m) { handlers.onIntent(m.payload); });
    if (handlers.onState) ch.on('broadcast', { event: 'state' }, function (m) { handlers.onState(m.payload); });
    if (handlers.onPresence) {
      ch.on('presence', { event: 'sync' }, function () { handlers.onPresence(ch.presenceState()); });
      ch.on('presence', { event: 'leave' }, function (e) { handlers.onPresence(ch.presenceState(), e); });
    }
    ch.subscribe(function (status) {
      if (status === 'SUBSCRIBED') {
        ch.track({ id: identity.id, name: identity.name, role: identity.role, at: Date.now() });
        if (handlers.onReady) handlers.onReady(ch);
      }
    });
    return {
      raw: ch,
      sendIntent: function (payload) { ch.send({ type: 'broadcast', event: 'intent', payload: payload }); },
      sendState: function (payload) { ch.send({ type: 'broadcast', event: 'state', payload: payload }); },
      close: function () { try { client().removeChannel(ch); } catch (e) {} }
    };
  }

  /* --------------------------------------------------------------------------
     2. Routeur de vues minimal (basé sur le hash)
     -------------------------------------------------------------------------- */
  var current = null; // contrôleur actif (host/player) pour nettoyage
  function teardown() { if (current && current.destroy) { try { current.destroy(); } catch (e) {} } current = null; }

  function route() {
    teardown();
    var h = location.hash.slice(1);
    var m = h.match(/^join=([A-Z0-9]{6})$/i);
    if (h === 'new') return renderHostSetup();          // créer une nouvelle partie
    if (h === 'host') {                                  // partie hôte en cours
      var saved = store.get('hostGame', null);
      if (saved && saved.code) return startHost(saved);
      return renderHostSetup();
    }
    if (m) return renderJoin(m[1].toUpperCase());
    return renderHome();
  }
  window.addEventListener('hashchange', route);

     3. Vue ACCUEIL
     -------------------------------------------------------------------------- */

     4. Vue CONFIGURATION HÔTE (avant création)

      '      <div><div class="text-xs text-white/50 mb-1">Bon vote</div><input id="pVote" type="number" value="1" class="w-full bg-black/40 rounded-lg py-2 text-center text-xl font-bold outline-none" /></div>',
      '      <div><div class="text-xs text-white/50 mb-1">Mauvais buzz</div><input id="pWrong" type="number" value="0" class="w-full bg-black/40 rounded-lg py-2 text-center text-xl font-bold outline-none" /></div>',
      '    </div>',

      '  <button id="create" class="w-full py-5 rounded-2xl text-xl font-extrabold bg-gradient-to-r from-neon-pink to-neon-violet shadow-lg active:animate-pop">Lancer la partie 🚀</button>',

  function initialState(code, hostName, partyName, cfg) {
    return {
      code: code, hostName: hostName, partyName: partyName, config: cfg,
      round: 0, phase: 'lobby', theme: '',
      buzzer: null, answer: null, votes: {}, result: null, buzzAt: 0,
      players: {},   // id -> { id, name, score }
      history: []    // { round, buzzer, answer, correct, votes }
    };
  }

  /* --------------------------------------------------------------------------
     5. CONTRÔLEUR HÔTE (autorité de la partie)
     -------------------------------------------------------------------------- */
  function startHost(state) {
    var code = state.code;
    store.set('hostGame', state);

    function persist() { store.set('hostGame', state); }
    function publish() { persist(); if (chan) chan.sendState(state); renderHost(); }

    function ensurePlayer(id, name) {
      if (!state.players[id]) state.players[id] = { id: id, name: name || 'Joueur', score: 0 };
      else if (name) state.players[id].name = name;
      return state.players[id];
    }

    /* Réception des intentions joueurs */
    function onIntent(p) {
      if (!p || !p.id) return;
      if (p.action === 'join') {
        ensurePlayer(p.id, p.name);
        beep(880, 0.08, 'sine');
        publish();
      } else if (p.action === 'buzz') {
        // Premier buzz reçu pendant la phase "buzzing" gagne.
        if (state.phase === 'buzzing' && !state.buzzer) {
          var pl = ensurePlayer(p.id, p.name);
          state.buzzer = { id: pl.id, name: pl.name };
          state.phase = 'answering';
          beep(180, 0.35, 'square'); vibrate([0, 120, 60, 120]);
          publish();
        }
      } else if (p.action === 'answer') {
        if (state.phase === 'answering' && state.buzzer && state.buzzer.id === p.id) {
          state.answer = String(p.text || '').slice(0, 120);
          state.phase = 'voting';
          beep(520, 0.12, 'sine');
          publish();
        }
      } else if (p.action === 'vote') {
        if (state.phase === 'voting' && state.buzzer && state.buzzer.id !== p.id) {
          state.votes[p.id] = p.value === 1 ? 1 : -1;
          publish();
        }
      } else if (p.action === 'leave') {
        // On garde le score (reconnexion possible) mais on peut nettoyer le lobby.
        publish();
      }
    }

    var chan = openChannel(code, { id: ME, name: state.hostName, role: 'host' }, {
      onIntent: onIntent,
      onReady: function () { publish(); },
      onPresence: function (st) {
        // Marque présents / absents pour l'affichage hôte (scores conservés).
        var present = {};
        Object.keys(st).forEach(function (k) { (st[k] || []).forEach(function (m) { present[m.id] = true; }); });
        state._present = present;
        renderHost();
      }
    });

    /* Actions hôte (machine à états) */
    function launchRound() {
      state.round += 1;
      state.phase = 'armed';
      state.buzzer = null; state.answer = null; state.votes = {}; state.result = null;
      state.buzzAt = Date.now() + BUZZ_LOCK_MS;
      publish();
      setTimeout(function () {
        if (state.phase === 'armed') { state.phase = 'buzzing'; beep(740, 0.12, 'sine'); publish(); }
      }, BUZZ_LOCK_MS);
    }
    function validate(correct) {
      if (!state.buzzer) return;
      var b = state.players[state.buzzer.id];
      if (b) b.score += correct ? state.config.pointsBuzz : state.config.pointsWrong;
      // Récompense les votes justes : 👍 si correct, 👎 si incorrect.
      Object.keys(state.votes).forEach(function (vid) {
        var agreed = (state.votes[vid] === 1) === correct;
        if (agreed && state.players[vid]) state.players[vid].score += state.config.pointsVote;
      });
      state.result = { correct: correct };
      state.phase = 'reveal';
      state.history.push({
        round: state.round, buzzer: state.buzzer, answer: state.answer,
        correct: correct, votes: tallyVotes()
      });
      beep(correct ? 880 : 160, 0.3, correct ? 'sine' : 'sawtooth');
      if (correct) confetti(150);
      publish();
    }
    function endGame() { state.phase = 'ended'; confetti(240); publish(); }
    function replay() {
      Object.keys(state.players).forEach(function (id) { state.players[id].score = 0; });
      state.round = 0; state.phase = 'lobby';
      state.buzzer = null; state.answer = null; state.votes = {}; state.result = null; state.history = [];
      publish();
    }
    function tallyVotes() {
      var up = 0, down = 0;
      Object.keys(state.votes).forEach(function (k) { state.votes[k] === 1 ? up++ : down++; });
      return { up: up, down: down };
    }

    current = {
      destroy: function () { if (chan) chan.close(); }
    };

    /* --- Rendu de l'écran hôte --- */
    function renderHost() {
      var s = state;
      var origin = location.origin + location.pathname;
      var joinUrl = origin + '#join=' + s.code;
      var lb = leaderboardArr(s.players);
      var present = s._present || {};

      var THEME_PRESETS = ['Années 80', 'Années 90', 'Années 2000', 'Disney', 'Rap FR', 'Variété FR', 'Rock', 'Films', 'Séries TV', 'Dessins animés', 'Été', 'Karaoké'];
      var showTheme = (s.phase === 'lobby' || s.phase === 'reveal');
      var themeBar = [
        '<div class="glass rounded-2xl p-3 mb-4">',
        '  <div class="flex items-center justify-between mb-2"><span class="text-xs font-bold uppercase text-white/50">🎯 Thème de la manche</span>' + (s.theme ? '<button id="themeClear" class="text-xs text-white/40 underline">effacer</button>' : '') + '</div>',
        '  <div class="flex gap-2 overflow-x-auto pb-1">' + THEME_PRESETS.map(function (t) { return '<button class="themeChip shrink-0 px-3 py-1.5 rounded-full text-sm font-bold ' + (s.theme === t ? 'bg-neon-pink text-white' : 'bg-black/30 text-white/70') + '" data-theme="' + esc(t) + '">' + esc(t) + '</button>'; }).join('') + '</div>',
        '  <input id="themeFree" value="' + esc(s.theme || '') + '" placeholder="…ou tape un thème libre" class="w-full mt-2 bg-black/40 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 ring-neon-cyan" />',
        '</div>'
      ].join('');

      var phaseBlock = '';
      if (s.phase === 'lobby') {
        var nb = lb.length;
        var chips = nb
          ? '<div class="flex flex-wrap justify-center gap-2 mt-1">' + lb.map(function (p) {
              var on = present[p.id];
              return '<span class="inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-sm font-bold animate-slidein ' + (on ? 'bg-neon-violet/30 ring-1 ring-neon-violet' : 'bg-black/30 text-white/50') + '">' +
                '<span class="w-6 h-6 rounded-full flex items-center justify-center text-xs ' + (on ? 'bg-neon-cyan text-black' : 'bg-white/10') + '">' + esc(initials(p.name)) + '</span>' +
                esc(p.name) + (on ? '' : ' 💤') + '</span>';
            }).join('') + '</div>'
          : '<p class="text-white/40 text-sm mt-2">En attente des joueurs… scanne le QR pour rejoindre 📲</p>';
        phaseBlock = [
          '<div class="glass rounded-2xl p-5 text-center animate-slidein">',
          '  <p class="text-white/60 mb-3">Partage ce code / QR pour rejoindre</p>',
          '  <div class="text-5xl font-extrabold tracking-[0.4em] text-neon-cyan mb-4">' + esc(s.code) + '</div>',
          '  <canvas id="qr" class="mx-auto rounded-xl bg-white p-2"></canvas>',
          '  <button id="copyLink" class="mt-4 text-sm text-white/60 underline">Copier le lien d\'invitation</button>',
          '  <div class="mt-6 flex items-center justify-center gap-2 text-white/80 font-bold"><span class="text-2xl">👥</span> ' + nb + ' joueur' + (nb > 1 ? 's' : '') + ' dans le salon</div>',
             chips,
          '  <button id="launch" class="mt-6 w-full py-4 rounded-xl text-lg font-extrabold bg-gradient-to-r from-neon-lime to-neon-cyan text-black active:animate-pop ' + (nb ? '' : 'opacity-50 pointer-events-none') + '">Lancer la manche 1 🎵</button>',
          '</div>'
        ].join('');
      } else if (s.phase === 'armed') {
        phaseBlock = '<div class="glass rounded-2xl p-8 text-center animate-slidein"><div class="text-6xl mb-2">⏳</div><p class="text-xl font-bold">Buzz verrouillé…</p><p class="text-white/50">Lance le morceau maintenant !</p></div>';
      } else if (s.phase === 'buzzing') {
        phaseBlock = '<div class="glass rounded-2xl p-8 text-center animate-slidein"><div class="text-6xl mb-2 animate-pulse">🔔</div><p class="text-2xl font-extrabold text-neon-lime">BUZZ OUVERT</p><p class="text-white/50">En attente du premier buzz…</p></div>';
      } else if (s.phase === 'answering') {
        phaseBlock = '<div class="glass rounded-2xl p-8 text-center animate-slidein"><p class="text-white/50 uppercase text-sm mb-1">A buzzé en premier</p><div class="text-4xl font-extrabold text-neon-pink text-glow mb-2">' + esc(s.buzzer.name) + '</div><p class="text-white/60">Il/elle écrit sa réponse…</p><button id="forceVote" class="mt-4 text-sm text-white/50 underline">Réponse orale → passer au vote</button></div>';
      } else if (s.phase === 'voting') {
        var t = tallyVotes();
        phaseBlock = [
          '<div class="glass rounded-2xl p-6 text-center animate-slidein">',
          '  <p class="text-white/50 uppercase text-sm">Réponse de ' + esc(s.buzzer.name) + '</p>',
          '  <div class="text-3xl font-extrabold my-3">' + (s.answer ? '« ' + esc(s.answer) + ' »' : '<span class="text-white/40 text-xl">(réponse orale)</span>') + '</div>',
          '  <div class="flex justify-center gap-6 text-xl my-4"><span>👍 ' + t.up + '</span><span>👎 ' + t.down + '</span></div>',
          '  <div class="grid grid-cols-2 gap-3">',
          '    <button id="ok" class="py-4 rounded-xl bg-neon-lime text-black font-extrabold active:animate-pop">✓ Correct</button>',
          '    <button id="ko" class="py-4 rounded-xl bg-rose-500 font-extrabold active:animate-pop">✗ Faux</button>',
          '  </div>',
          '</div>'
        ].join('');
      } else if (s.phase === 'reveal') {
        phaseBlock = [
          '<div class="glass rounded-2xl p-8 text-center animate-slidein">',
          '  <div class="text-6xl mb-2">' + (s.result.correct ? '✅' : '❌') + '</div>',
          '  <p class="text-2xl font-extrabold ' + (s.result.correct ? 'text-neon-lime' : 'text-rose-400') + '">' + (s.result.correct ? 'Bonne réponse !' : 'Raté !') + '</p>',
          '  <p class="text-white/60 mt-1">' + esc(s.buzzer.name) + (s.result.correct ? ' +' + s.config.pointsBuzz : ' ' + (s.config.pointsWrong >= 0 ? '+' : '') + s.config.pointsWrong) + ' pts</p>',
          '  <div class="grid grid-cols-2 gap-3 mt-6">',
          '    <button id="next" class="py-4 rounded-xl bg-gradient-to-r from-neon-lime to-neon-cyan text-black font-extrabold active:animate-pop">Manche suivante ▶</button>',
          '    <button id="end" class="py-4 rounded-xl glass font-extrabold active:animate-pop">Terminer 🏁</button>',
          '  </div>',
          '</div>'
        ].join('');
      } else if (s.phase === 'ended') {
        phaseBlock = [
          '<div class="glass rounded-2xl p-6 text-center animate-slidein">',
          '  <div class="text-5xl mb-1">🏆</div>',
          '  <p class="bt-title text-2xl font-extrabold glow-cyan">CLASSEMENT FINAL</p>',
          '  <p class="text-white/50 text-sm">' + s.round + ' manche' + (s.round > 1 ? 's' : '') + ' jouée' + (s.round > 1 ? 's' : '') + '</p>',
               renderPodium(lb),
          '  <div class="grid grid-cols-2 gap-3 mt-6">',
          '    <button id="export" class="py-3 rounded-xl bg-neon-gold text-black font-extrabold active:animate-pop">📸 Exporter</button>',
          '    <button id="replay" class="py-3 rounded-xl bg-gradient-to-r from-neon-pink to-neon-violet font-extrabold active:animate-pop">↻ Rejouer</button>',
          '  </div>',
          '</div>'
        ].join('');
      }

      app.innerHTML = [
        '<div class="flex-1 flex flex-col px-5 py-6 max-w-lg mx-auto w-full">',
        '  <div class="flex items-center justify-between mb-4">',
        '    <div class="min-w-0"><div class="text-xs text-white/40 uppercase tracking-wide">Hôte · ' + esc(s.hostName) + '</div><div class="text-xl font-extrabold truncate">' + esc(s.partyName) + '</div></div>',
        '    <div class="flex items-center gap-3 shrink-0">',
        '      <button id="gear" class="w-10 h-10 rounded-full glass flex items-center justify-center text-lg" aria-label="Réglages">⚙️</button>',
        '      <div class="text-right"><div class="text-xs text-white/40 uppercase">Manche</div><div class="text-2xl font-extrabold text-neon-cyan">' + (s.round || '–') + '</div></div>',
        '    </div>',
        '  </div>',
        (showTheme ? themeBar : ''),
        '  <div class="mb-5">' + phaseBlock + '</div>',
        '  <div id="lbCapture" class="glass rounded-2xl p-5 flex-1">',
        '    <div class="flex items-center justify-between mb-3"><p class="font-extrabold uppercase text-white/60 text-sm">Classement</p><span class="text-xs text-white/40">' + esc(s.partyName) + '</span></div>',
             renderLeaderboard(lb, present),
        '  </div>',
        '  <button id="quit" class="mt-4 text-white/40 text-sm">Quitter la partie</button>',
        '</div>'
      ].join('');

      // QR code
      if (s.phase === 'lobby' && window.QRCode) {
        QRCode.toCanvas($('#qr'), joinUrl, { width: 180, margin: 1, color: { dark: '#0b0014', light: '#ffffff' } }, function () {});
        var copy = $('#copyLink');
        if (copy) copy.onclick = function () { navigator.clipboard && navigator.clipboard.writeText(joinUrl); toast('Lien copié !', 'ok'); };
        var l = $('#launch'); if (l) l.onclick = function () { if (Object.keys(s.players).length) launchRound(); else toast('Aucun joueur connecté', 'err'); };
      }
      bind('#forceVote', function () { s.phase = 'voting'; s.answer = null; publish(); });
      bind('#ok', function () { validate(true); });
      bind('#ko', function () { validate(false); });
      bind('#next', launchRound);
      bind('#end', endGame);
      bind('#replay', replay);
      bind('#export', function () { exportLeaderboard(s); });
      bind('#gear', openSettings);
      Array.prototype.forEach.call(document.querySelectorAll('.themeChip'), function (b) { b.onclick = function () { s.theme = b.getAttribute('data-theme'); publish(); }; });
      var tf = $('#themeFree'); if (tf) tf.onchange = function () { s.theme = tf.value.trim(); publish(); };
      bind('#themeClear', function () { s.theme = ''; publish(); });
      bind('#quit', function () { if (confirm('Quitter et supprimer la partie ?')) { store.del('hostGame'); teardown(); location.hash = ''; } });
    }

    renderHost();
  }

  /* --------------------------------------------------------------------------
     6. Vue JOIN (pseudo) puis CONTRÔLEUR JOUEUR
     -------------------------------------------------------------------------- */
  function renderJoin(code) {
    var lastName = store.get('playerName', '');
    app.innerHTML = [
      '<div class="flex-1 flex flex-col items-center justify-center px-6 py-10 max-w-md mx-auto w-full">',
      '  <div class="text-6xl mb-3 animate-float">🎤</div>',
      '  <p class="text-white/60">Tu rejoins la partie</p>',
      '  <div class="text-4xl font-extrabold tracking-[0.3em] text-neon-cyan my-3">' + esc(code) + '</div>',
      '  <label class="block text-sm text-white/60 mb-2 mt-6 font-bold uppercase self-start">Ton pseudo</label>',
      '  <input id="pname" maxlength="20" value="' + esc(lastName) + '" placeholder="Ton prénom"',
      '    class="w-full bg-black/40 rounded-xl px-4 py-4 text-lg text-center outline-none focus:ring-2 ring-neon-cyan mb-6" />',
      '  <button id="enter" class="w-full py-5 rounded-2xl text-xl font-extrabold bg-gradient-to-r from-neon-cyan to-neon-lime text-black active:animate-pop">Entrer 🎉</button>',
      '  <button id="back" class="mt-5 text-white/40 text-sm">← Annuler</button>',
      '</div>'
    ].join('');
    $('#back').onclick = function () { location.hash = ''; };
    function enter() {
      var name = $('#pname').value.trim();
      if (!name) { toast('Choisis un pseudo', 'err'); vibrate(80); return; }
      store.set('playerName', name);
      beep(660, 0.1, 'sine'); // débloque l'audio iOS via interaction
      startPlayer(code, name);
    }
    $('#enter').onclick = enter;
    $('#pname').onkeydown = function (e) { if (e.key === 'Enter') enter(); };
  }

  function startPlayer(code, name) {
    var view = { phase: 'connecting' };
    var lastState = null;
    var voted = false, lastPhase = null;

    var chan = openChannel(code, { id: ME, name: name, role: 'player' }, {
      onState: function (st) {
        // Détecte les transitions pour le feedback sensoriel.
        if (st.phase === 'buzzing' && lastPhase !== 'buzzing') { beep(740, 0.12, 'sine'); vibrate(40); }
        if (st.phase === 'answering' && st.buzzer && st.buzzer.id === ME && lastPhase !== 'answering') { beep(180, 0.3, 'square'); vibrate([0, 100, 50, 100]); }
        if (st.phase === 'voting' && lastPhase !== 'voting') voted = false;
        if (st.phase === 'reveal' && st.result && st.result.correct && lastPhase !== 'reveal') confetti(120);
        if (st.phase === 'ended' && lastPhase !== 'ended') confetti(220);
        if (st.round !== (lastState && lastState.round)) voted = false;
        lastPhase = st.phase;
        lastState = st;
        renderPlayer();
      },
      onReady: function () { chan.sendIntent({ action: 'join', id: ME, name: name }); renderPlayer(); }
    });

    current = { destroy: function () { try { chan.sendIntent({ action: 'leave', id: ME }); } catch (e) {} chan.close(); } };

    function me() { return lastState && lastState.players ? lastState.players[ME] : null; }

    function renderPlayer() {
      var s = lastState;
      if (!s) {
        app.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center px-6 text-center"><div class="text-5xl mb-4 animate-pulse">📡</div><p class="text-white/70">Connexion à la partie…</p><button id="back" class="mt-8 text-white/40 text-sm">← Quitter</button></div>';
        bind('#back', function () { location.hash = ''; });
        return;
      }
      var mine = me();
      var myScore = mine ? mine.score : 0;
      var lb = leaderboardArr(s.players);
      var rank = lb.findIndex(function (p) { return p.id === ME; }) + 1;
      var isBuzzer = s.buzzer && s.buzzer.id === ME;

      var center = '';
      if (s.phase === 'lobby') {
        center = '<div class="text-center animate-slidein"><div class="text-6xl mb-3 animate-float">🍿</div><p class="text-xl font-bold">En attente du lancement…</p><p class="text-white/50 mt-1">L\'hôte va démarrer la manche 1</p></div>';
      } else if (s.phase === 'armed') {
        center = buzzButton(true, '⏳', 'Prépare-toi…');
      } else if (s.phase === 'buzzing') {
        center = buzzButton(false, 'BUZZ', 'Appuie vite !');
      } else if (s.phase === 'answering') {
        if (isBuzzer) {
          center = [
            '<div class="w-full animate-slidein text-center">',
            '  <p class="text-2xl font-extrabold text-neon-lime mb-1">À toi ! 🎉</p>',
            '  <p class="text-white/60 mb-4">Écris ta réponse</p>',
            '  <input id="ans" maxlength="120" placeholder="Titre / artiste…" class="w-full bg-black/40 rounded-xl px-4 py-4 text-lg text-center outline-none focus:ring-2 ring-neon-pink mb-4" />',
            '  <button id="send" class="w-full py-4 rounded-xl text-lg font-extrabold bg-gradient-to-r from-neon-pink to-neon-violet active:animate-pop">Valider ma réponse</button>',
            '  <button id="oral" class="mt-3 text-white/40 text-sm">Je réponds à l\'oral</button>',
            '</div>'
          ].join('');
        } else {
          center = '<div class="text-center animate-slidein"><div class="text-5xl mb-3">🙊</div><p class="text-xl font-bold"><span class="text-neon-pink">' + esc(s.buzzer.name) + '</span> a buzzé !</p><p class="text-white/50 mt-1">Réponse en cours…</p></div>';
        }
      } else if (s.phase === 'voting') {
        if (isBuzzer) {
          center = '<div class="text-center animate-slidein"><div class="text-5xl mb-3">⏳</div><p class="text-xl font-bold">En attente du vote…</p></div>';
        } else {
          center = [
            '<div class="w-full text-center animate-slidein">',
            '  <p class="text-white/60 mb-1">Réponse de ' + esc(s.buzzer.name) + '</p>',
            '  <div class="text-2xl font-extrabold mb-5">' + (s.answer ? '« ' + esc(s.answer) + ' »' : '<span class="text-white/40 text-lg">(à l\'oral)</span>') + '</div>',
            voted
              ? '<p class="text-neon-cyan font-bold">Vote enregistré ✓</p>'
              : '<div class="grid grid-cols-2 gap-4"><button id="up" class="py-8 rounded-2xl bg-neon-lime text-black text-4xl font-extrabold active:animate-pop">👍</button><button id="down" class="py-8 rounded-2xl bg-rose-500 text-4xl font-extrabold active:animate-pop">👎</button></div>',
            '</div>'
          ].join('');
        }
      } else if (s.phase === 'reveal') {
        var goodForMe = isBuzzer && s.result.correct;
        center = '<div class="text-center animate-slidein"><div class="text-6xl mb-2">' + (s.result.correct ? '✅' : '❌') + '</div><p class="text-2xl font-extrabold ' + (s.result.correct ? 'text-neon-lime' : 'text-rose-400') + '">' + (s.result.correct ? 'Bonne réponse !' : 'Raté !') + '</p><p class="text-white/60 mt-1">' + (goodForMe ? 'Bien joué 🔥' : esc(s.buzzer.name)) + '</p></div>';
      } else if (s.phase === 'ended') {
        center = [
          '<div class="w-full text-center animate-slidein">',
          '  <div class="text-6xl mb-1">🏆</div>',
          '  <p class="bt-title text-2xl font-extrabold glow-cyan">PARTIE TERMINÉE</p>',
          '  <p class="text-white/60 mt-1">Tu finis ' + (rank ? rank + (rank === 1 ? 'er' : 'e') : '') + ' avec <span class="text-neon-gold font-extrabold">' + myScore + ' pts</span></p>',
               renderPodium(lb),
          '</div>'
        ].join('');
      }

      app.innerHTML = [
        '<div class="flex-1 flex flex-col px-5 py-5 max-w-md mx-auto w-full">',
        '  <div class="flex items-center justify-between mb-2">',
        '    <div class="flex items-center gap-2 text-sm"><button id="gear" class="w-8 h-8 rounded-full glass flex items-center justify-center" aria-label="Réglages">⚙️</button><span class="text-white/40">Manche</span> <span class="font-extrabold text-neon-cyan">' + (s.round || '–') + '</span></div>',
        '    <div class="text-sm font-bold">' + esc(name) + ' · <span class="text-neon-gold">' + myScore + ' pts</span>' + (rank ? ' · #' + rank : '') + '</div>',
        '  </div>',
        (s.theme && s.phase !== 'ended' ? '  <div class="text-center mt-1"><span class="inline-block px-3 py-1 rounded-full bg-neon-pink/20 ring-1 ring-neon-pink text-sm font-bold">🎯 ' + esc(s.theme) + '</span></div>' : ''),
        '  <div class="flex-1 flex flex-col items-center justify-center py-6">' + center + '</div>',
        '  <div class="glass rounded-2xl p-4">' + renderLeaderboard(lb, s._present || {}, ME) + '</div>',
        '  <button id="leave" class="mt-3 text-white/40 text-sm">Quitter</button>',
        '</div>'
      ].join('');

      // Liaisons d'événements
      bind('#leave', function () { location.hash = ''; });
      bind('#gear', openSettings);
      var ans = $('#ans');
      if (ans) {
        ans.focus();
        bind('#send', function () { var v = ans.value.trim(); chan.sendIntent({ action: 'answer', id: ME, text: v }); });
        ans.onkeydown = function (e) { if (e.key === 'Enter') { chan.sendIntent({ action: 'answer', id: ME, text: ans.value.trim() }); } };
        bind('#oral', function () { chan.sendIntent({ action: 'answer', id: ME, text: '' }); });
      }
      bind('#up', function () { voted = true; chan.sendIntent({ action: 'vote', id: ME, value: 1 }); beep(880, 0.08, 'sine'); renderPlayer(); });
      bind('#down', function () { voted = true; chan.sendIntent({ action: 'vote', id: ME, value: -1 }); beep(300, 0.08, 'sine'); renderPlayer(); });

      // Le bouton BUZZ
      var bz = $('#buzz');
      if (bz) {
        bz.onclick = function () {
          if (s.phase !== 'buzzing' || s.buzzer) return;
          chan.sendIntent({ action: 'buzz', id: ME, name: name });
          beep(180, 0.25, 'square'); vibrate([0, 90, 40, 90]);
          bz.classList.add('animate-pop');
        };
      }
    }

    renderPlayer();
  }

  /* Gros bouton BUZZ (réutilisé). disabled = verrouillé. */
  function buzzButton(disabled, label, sub) {
    return [
      '<div class="flex flex-col items-center w-full">',
      '  <button id="buzz" ' + (disabled ? 'disabled' : '') + ' class="bt-title select-none w-60 h-60 sm:w-64 sm:h-64 rounded-full text-4xl font-extrabold flex items-center justify-center border-4 ' +
      (disabled
        ? 'border-white/10 bg-white/5 text-white/40 cursor-not-allowed'
        : 'border-neon-cyan text-white bg-gradient-to-br from-neon-pink to-rose-600 shadow-[0_0_70px_rgba(255,46,154,.7),inset_0_0_44px_rgba(34,211,238,.35)] animate-ring active:animate-pop') + '">' + esc(label) + '</button>',
      '  <p class="mt-6 text-white/60 text-lg">' + esc(sub) + '</p>',
      '</div>'
    ].join('');
  }

  /* --------------------------------------------------------------------------
     7. Leaderboard (partagé hôte/joueur)
     -------------------------------------------------------------------------- */
  function leaderboardArr(players) {
    return Object.keys(players || {}).map(function (k) { return players[k]; })
      .sort(function (a, b) { return b.score - a.score || a.name.localeCompare(b.name); });
  }
  function avatarGrad(name) {
    var h = 0, s = String(name || '?');
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    var a = h % 360, b = (a + 55) % 360;
    return 'linear-gradient(135deg,hsl(' + a + ',85%,60%),hsl(' + b + ',85%,48%))';
  }
  function renderLeaderboard(lb, present, highlightId) {
    if (!lb.length) return '<p class="text-white/40 text-center py-3">Aucun joueur pour l\'instant…</p>';
    var medals = ['🥇', '🥈', '🥉'];
    var max = Math.max(1, lb[0] ? lb[0].score : 1);
    return '<div class="space-y-2">' + lb.map(function (p, i) {
      var on = present && present[p.id];
      var hi = highlightId && p.id === highlightId;
      var pct = p.score > 0 ? Math.max(8, Math.round((p.score / max) * 100)) : 0;
      return [
        '<div class="flex items-center gap-3 rounded-xl px-3 py-2 ' + (hi ? 'bg-neon-violet/25 ring-1 ring-neon-violet' : 'bg-black/25') + '">',
        '  <div class="w-6 text-center text-lg font-extrabold ' + (i < 3 ? '' : 'text-white/40') + '">' + (medals[i] || (i + 1)) + '</div>',
        '  <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-extrabold shrink-0 ' + (on ? '' : 'opacity-40') + '" style="background:' + avatarGrad(p.name) + '">' + esc(initials(p.name)) + '</div>',
        '  <div class="flex-1 min-w-0">',
        '    <div class="font-bold truncate text-sm ' + (on ? '' : 'text-white/40') + '">' + esc(p.name) + (on ? '' : ' <span class="text-xs">·zzz</span>') + '</div>',
        '    <div class="h-1.5 mt-1 rounded-full bg-white/10 overflow-hidden"><div class="h-full rounded-full transition-all duration-700" style="width:' + pct + '%;background:linear-gradient(90deg,#22d3ee,#ff2e9a)"></div></div>',
        '  </div>',
        '  <div class="font-extrabold text-neon-gold tabular-nums text-lg">' + p.score + '</div>',
        '</div>'
      ].join('');
    }).join('') + '</div>';
  }

  /* Podium top 3 (écran de fin). */
  function renderPodium(lb) {
    if (!lb.length) return '';
    var top = lb.slice(0, 3);
    var heights = ['h-28', 'h-20', 'h-16'];
    var medals = ['🥇', '🥈', '🥉'];
    var order = [1, 0, 2]; // 2e à gauche, 1er au centre, 3e à droite
    var cols = order.filter(function (idx) { return top[idx]; }).map(function (idx) {
      var p = top[idx];
      return [
        '<div class="flex flex-col items-center justify-end gap-1.5 flex-1 min-w-0">',
        '  <div class="text-2xl h-7">' + (idx === 0 ? '👑' : '') + '</div>',
        '  <div class="w-11 h-11 rounded-full flex items-center justify-center text-sm font-extrabold shrink-0" style="background:' + avatarGrad(p.name) + '">' + esc(initials(p.name)) + '</div>',
        '  <div class="text-xs font-bold truncate max-w-[5.5rem] text-center w-full">' + esc(p.name) + '</div>',
        '  <div class="w-full ' + heights[idx] + ' rounded-t-xl flex items-start justify-center pt-2 text-xl ' + (idx === 0 ? 'bg-gradient-to-t from-neon-gold/20 to-neon-gold/70' : 'bg-gradient-to-t from-white/5 to-white/20') + '">' + medals[idx] + '</div>',
        '  <div class="text-neon-gold font-extrabold tabular-nums">' + p.score + '</div>',
        '</div>'
      ].join('');
    }).join('');
    return '<div class="flex items-end gap-2 justify-center mt-5 mb-1">' + cols + '</div>';
  }

  /* Export du classement final en image (html2canvas). */
  function exportLeaderboard(s) {
    var lb = leaderboardArr(s.players);
    var card = document.createElement('div');
    card.style.cssText = 'position:fixed;left:-9999px;top:0;width:480px;padding:32px;background:linear-gradient(160deg,#0b0014,#1a0b2e);color:#fff;font-family:"Baloo 2",sans-serif;border-radius:24px;';
    card.innerHTML = '<div style="text-align:center;font-size:40px">🏆</div>' +
      '<div style="text-align:center;font-size:26px;font-weight:800;margin-bottom:4px">' + esc(s.partyName) + '</div>' +
      '<div style="text-align:center;color:#ffffff99;margin-bottom:20px">Classement final · ' + s.round + ' manche(s)</div>' +
      renderLeaderboard(lb, {}, null);
    document.body.appendChild(card);
    if (!window.html2canvas) { toast('Export indisponible', 'err'); card.remove(); return; }
    html2canvas(card, { backgroundColor: null, scale: 2 }).then(function (canvas) {
      card.remove();
      var a = document.createElement('a');
      a.download = 'blindtest-' + (s.partyName || 'classement').replace(/\s+/g, '-').toLowerCase() + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      toast('Image exportée 📸', 'ok');
    }).catch(function () { card.remove(); toast('Échec de l\'export', 'err'); });
  }

  /* Helper de liaison sûre (no-op si l'élément n'existe pas). */
  function bind(sel, fn) { var e = $(sel); if (e) e.onclick = fn; }

  /* --------------------------------------------------------------------------
     7bis. MENU RÉGLAGES (thèmes, partage, préférences, crédits)
     -------------------------------------------------------------------------- */
  var prefs = {
    theme: store.get('theme', 'synthwave'),
    muted: store.get('muted', false),
    novib: store.get('novib', false),
    noanim: store.get('noanim', false)
  };
  function applyPrefs() {
    document.body.setAttribute('data-theme', prefs.theme || 'synthwave');
    document.body.classList.toggle('bt-no-anim', !!prefs.noanim);
  }

  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferredPrompt = e; });

  var THEMES = [
    { id: 'synthwave', name: 'Synthwave', sw: 'linear-gradient(135deg,#ff2e9a,#8b5cf6,#22d3ee)' },
    { id: 'miami', name: 'Miami', sw: 'linear-gradient(135deg,#27d3c4,#ff6ad5)' },
    { id: 'outrun', name: 'Outrun', sw: 'linear-gradient(135deg,#ffb43d,#ff2e3a,#7a1340)' },
    { id: 'ice', name: 'Cyber Ice', sw: 'linear-gradient(135deg,#9fe3ff,#1455c0)' },
    { id: 'galaxy', name: 'Galaxy', sw: 'linear-gradient(135deg,#c084fc,#ec4899,#3b1080)' },
    { id: 'mint', name: 'Vapor Mint', sw: 'linear-gradient(135deg,#5eead4,#fbcfe8)' }
  ];

  var settingsEl = document.getElementById('settings');
  function closeSettings() { if (settingsEl) { settingsEl.classList.add('hidden'); settingsEl.innerHTML = ''; } }
  function openSettings() {
    if (!settingsEl) return;
    var appUrl = location.origin + location.pathname;
    var swatches = THEMES.map(function (t) {
      return '<button class="swatch ' + (prefs.theme === t.id ? 'active' : '') + '" data-theme="' + t.id + '" title="' + t.name + '" style="background:' + t.sw + '"></button>';
    }).join('');
    settingsEl.innerHTML = [
      '<div class="set-panel p-5 animate-slidein">',
      '  <div class="flex items-center justify-between mb-1">',
      '    <h2 class="bt-title text-xl font-extrabold glow-cyan">RÉGLAGES</h2>',
      '    <button id="setClose" class="w-9 h-9 rounded-full glass text-lg">✕</button>',
      '  </div>',

      '  <p class="text-xs font-bold uppercase text-white/50 mt-4 mb-2">Thème de couleur</p>',
      '  <div class="flex flex-wrap gap-3">' + swatches + '</div>',

      '  <p class="text-xs font-bold uppercase text-white/50 mt-6 mb-2">Partager l\'application</p>',
      '  <div class="glass rounded-2xl p-4 text-center">',
      '    <div class="bt-logo text-2xl leading-none">DJ BLIND TEST</div>',
      '    <canvas id="setqr" class="mx-auto rounded-xl bg-white p-2 my-3"></canvas>',
      '    <div class="text-white/45 text-xs break-all mb-3">' + esc(appUrl) + '</div>',
      '    <div class="grid grid-cols-2 gap-2">',
      '      <button id="setShare" class="btn-glow py-2.5 rounded-xl bg-gradient-to-r from-neon-pink to-neon-violet font-bold text-sm">Partager 📤</button>',
      '      <button id="setCopy" class="py-2.5 rounded-xl glass font-bold text-sm">Copier le lien</button>',
      '    </div>',
      '  </div>',

      '  <p class="text-xs font-bold uppercase text-white/50 mt-6 mb-2">Préférences</p>',
      '  <div class="glass rounded-2xl px-4">',
      '    <div class="set-row" style="border-top:none"><span>🔊 Sons</span><button id="tgSound" class="toggle ' + (prefs.muted ? '' : 'on') + '"></button></div>',
      '    <div class="set-row"><span>📳 Vibrations</span><button id="tgVib" class="toggle ' + (prefs.novib ? '' : 'on') + '"></button></div>',
      '    <div class="set-row"><span>🎉 Animations &amp; confettis</span><button id="tgAnim" class="toggle ' + (prefs.noanim ? '' : 'on') + '"></button></div>',
      '  </div>',

      '  <p class="text-xs font-bold uppercase text-white/50 mt-6 mb-2">Application</p>',
      '  <div class="grid grid-cols-2 gap-2">',
           (deferredPrompt ? '<button id="setInstall" class="btn-glow-cyan py-3 rounded-xl bg-neon-cyan text-black font-extrabold text-sm">📲 Installer l\'app</button>' : ''),
      '    <button id="setFs" class="py-3 rounded-xl glass font-bold text-sm ' + (deferredPrompt ? '' : 'col-span-2') + '">⛶ Plein écran</button>',
      '  </div>',

      '  <p class="text-xs font-bold uppercase text-white/50 mt-6 mb-2">Aide au développement</p>',
      '  <button id="setFeedback" class="w-full py-3 rounded-xl glass font-bold flex items-center justify-center gap-2">💬 Donner mon avis / signaler un bug</button>',

      '  <p class="text-xs font-bold uppercase text-white/50 mt-6 mb-2">Crédits</p>',
      '  <div class="glass rounded-2xl p-4 text-center text-sm">',
      '    <div class="text-white/80">Conçu par <span class="font-bold text-neon-cyan">Florian</span></div>',
      '    <div class="text-white/50">Créateur d\'applications</div>',
      '    <a href="mailto:archi.tech.fr@gmail.com" class="inline-block mt-2 text-neon-pink font-bold">archi.tech.fr@gmail.com</a>',
      '    <div class="text-white/30 text-xs mt-3">DJ Blind Test · v1.1 · Synthwave</div>',
      '  </div>',

      '  <button id="setDone" class="btn-glow w-full mt-5 py-3.5 rounded-xl bg-gradient-to-r from-neon-pink to-neon-violet font-extrabold">Fermer</button>',
      '</div>'
    ].join('');
    settingsEl.classList.remove('hidden');

    if (window.QRCode) QRCode.toCanvas($('#setqr'), appUrl, { width: 168, margin: 1, color: { dark: '#0b0014', light: '#ffffff' } }, function () {});

    settingsEl.onclick = function (e) { if (e.target === settingsEl) closeSettings(); };
    bind('#setClose', closeSettings);
    bind('#setDone', closeSettings);

    Array.prototype.forEach.call(settingsEl.querySelectorAll('.swatch'), function (b) {
      b.onclick = function () { prefs.theme = b.getAttribute('data-theme'); store.set('theme', prefs.theme); applyPrefs(); openSettings(); };
    });

    bind('#setCopy', function () { if (navigator.clipboard) navigator.clipboard.writeText(appUrl); toast('Lien copié !', 'ok'); });
    bind('#setShare', function () {
      if (navigator.share) navigator.share({ title: 'DJ Blind Test', text: 'Viens jouer au Blind Test musical !', url: appUrl }).catch(function () {});
      else { if (navigator.clipboard) navigator.clipboard.writeText(appUrl); toast('Lien copié !', 'ok'); }
    });

    bind('#tgSound', function () { prefs.muted = !prefs.muted; store.set('muted', prefs.muted); if (!prefs.muted) beep(660, 0.08, 'sine'); openSettings(); });
    bind('#tgVib', function () { prefs.novib = !prefs.novib; store.set('novib', prefs.novib); if (!prefs.novib) vibrate(60); openSettings(); });
    bind('#tgAnim', function () { prefs.noanim = !prefs.noanim; store.set('noanim', prefs.noanim); applyPrefs(); if (!prefs.noanim) confetti(50); openSettings(); });

    bind('#setInstall', function () { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; closeSettings(); } });
    bind('#setFs', function () { try { if (document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); } catch (e) {} });
    bind('#setFeedback', openFeedback);
  }

  /* Formulaire de retour d'expérience (envoi par email, sans serveur). */
  function openFeedback() {
    if (!settingsEl) return;
    var fbType = 'idea', fbRating = 0;
    function chip(id, emo, lbl) {
      return '<button data-fbt="' + id + '" class="fbchip flex-1 py-2.5 rounded-xl glass font-bold text-sm">' + emo + ' ' + lbl + '</button>';
    }
    function render() {
      settingsEl.innerHTML = [
        '<div class="set-panel p-5 animate-slidein">',
        '  <div class="flex items-center justify-between mb-3">',
        '    <button id="fbBack" class="text-white/60 text-sm">← Retour</button>',
        '    <h2 class="bt-title text-lg font-extrabold glow-cyan">TON AVIS</h2>',
        '    <button id="fbClose" class="w-9 h-9 rounded-full glass text-lg">✕</button>',
        '  </div>',
        '  <p class="text-white/55 text-sm mb-4">Aide à améliorer l\'app : un bug, une idée, un ressenti — tout est utile 🙏</p>',
        '  <p class="text-xs font-bold uppercase text-white/50 mb-2">Type</p>',
        '  <div class="flex gap-2 mb-4">' + chip('bug', '🐞', 'Bug') + chip('idea', '💡', 'Idée') + chip('other', '💬', 'Autre') + '</div>',
        '  <p class="text-xs font-bold uppercase text-white/50 mb-2">Note globale</p>',
        '  <div id="fbStars" class="flex gap-1 text-3xl mb-4">' + [1, 2, 3, 4, 5].map(function (i) { return '<button data-star="' + i + '">★</button>'; }).join('') + '</div>',
        '  <textarea id="fbMsg" rows="5" maxlength="1000" placeholder="Décris ton idée, le bug rencontré, ce que tu aimerais…" class="w-full bg-black/40 rounded-xl px-4 py-3 outline-none focus:ring-2 ring-neon-cyan mb-3"></textarea>',
        '  <label class="flex items-center gap-2 text-sm text-white/60 mb-4"><input id="fbTech" type="checkbox" checked class="w-4 h-4" /> Inclure les infos techniques (aide au débogage)</label>',
        '  <button id="fbSend" class="btn-glow w-full py-3.5 rounded-xl bg-gradient-to-r from-neon-pink to-neon-violet font-extrabold">Envoyer 📨</button>',
        '  <p class="text-white/35 text-xs text-center mt-3">Envoyé par email à archi.tech.fr@gmail.com</p>',
        '</div>'
      ].join('');
      settingsEl.classList.remove('hidden');

      Array.prototype.forEach.call(settingsEl.querySelectorAll('.fbchip'), function (b) {
        var on = b.getAttribute('data-fbt') === fbType;
        if (on) { b.classList.add('ring-2', 'ring-neon-pink'); }
        b.onclick = function () { fbType = b.getAttribute('data-fbt'); render(); };
      });
      Array.prototype.forEach.call(settingsEl.querySelectorAll('#fbStars button'), function (b) {
        var v = +b.getAttribute('data-star');
        b.classList.add(v <= fbRating ? 'text-neon-gold' : 'opacity-40');
        b.onclick = function () { fbRating = v; render(); };
      });

      bind('#fbBack', openSettings);
      bind('#fbClose', closeSettings);
      settingsEl.onclick = function (e) { if (e.target === settingsEl) closeSettings(); };

      bind('#fbSend', function () {
        var ta = $('#fbMsg');
        var msg = ta ? ta.value.trim() : '';
        if (!msg) { toast('Écris un petit message 🙂', 'err'); if (ta) ta.focus(); return; }
        var tech = $('#fbTech') && $('#fbTech').checked;
        var labels = { bug: '🐞 Bug', idea: '💡 Idée', other: '💬 Retour' };
        var subject = '[DJ Blind Test] ' + (labels[fbType] || 'Retour') + (fbRating ? ' — ' + fbRating + '/5' : '');
        var body = msg;
        if (tech) {
          body += '\n\n----- infos techniques -----\n'
            + 'App : DJ Blind Test v1.1\n'
            + 'Thème : ' + (prefs.theme || 'synthwave') + '\n'
            + 'Écran : ' + (window.screen ? screen.width + 'x' + screen.height : '?') + ' (dpr ' + (window.devicePixelRatio || 1) + ')\n'
            + 'Langue : ' + (navigator.language || '?') + '\n'
            + 'Navigateur : ' + navigator.userAgent;
        }
        if (navigator.clipboard) navigator.clipboard.writeText(subject + '\n\n' + body).catch(function () {});
        location.href = 'mailto:archi.tech.fr@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
        toast('Merci pour ton retour ! 🙏', 'ok');
        setTimeout(closeSettings, 500);
      });
    }
    render();
  }

  /* --------------------------------------------------------------------------
     8. Démarrage
     -------------------------------------------------------------------------- */
  applyPrefs(); // applique le thème + préférences enregistrés avant le 1er rendu

  /* PWA : service worker (cache + installable plein écran). */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }

  if (!SB_URL || !window.supabase) {
    app.innerHTML = '<div class="flex-1 flex items-center justify-center p-8 text-center text-white/70">Configuration Supabase manquante.<br>Vérifie assets/js/supabase-config.js</div>';
  } else {
    route();
  }
})();

</script>
</body>
</html>
